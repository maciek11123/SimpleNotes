<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DotMemo - Terminal Console</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0c">
  
  <!-- PWA iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DotMemo">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  
  <link rel="stylesheet" href="../../shared/style.css?v=3.2">
</head>
<body>
  <div class="app-container">
    

    <!-- Unified Creator Panel (Always visible at the top) -->
    <div class="notes-creator">
      <div class="notes-creator-title-row">
        <input type="text" id="note-title" class="finput" placeholder="TITLE..." autocomplete="off">
        <button class="btn-icon" id="mode-toggle-btn" onclick="window.toggleInputMode()" title="Toggle List Mode">☑️</button>
      </div>
      
      <textarea id="note-body" class="finput" placeholder="BRAIN DUMP..."></textarea>
      
      <div id="list-builder" class="list-builder">
        <div id="list-items-container"></div>
        <button class="btn-sec" style="width: fit-content; padding: 6px 12px; font-size: 12px;" onclick="window.addListInputRow()">+ Add Item</button>
      </div>

      <div class="action-row">
        <button class="btn-terminal primary" id="save-btn">SAVE NOTE</button>
        <button class="btn-terminal" id="cancel-edit-btn" onclick="window.cancelEdit()" style="display:none;">CANCEL</button>
        <button class="btn-terminal" id="mic-btn">REC AUDIO</button>
      </div>
    </div>

    <!-- Notes List Feed -->
    <div class="list-panel">
      <div class="notes-feed" id="notes-list-container"></div>
    </div>

    <!-- Auth Status Bar -->
    <div class="auth-bar hidden" style="flex-direction: column; gap: 8px;">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <span id="auth-status">> OFFLINE MODE</span>
        <div style="display: flex; gap: 4px; align-items: center;">
          <button id="archive-toggle-btn" class="btn-auth" onclick="window.toggleArchivesView()" style="font-size: 8px; padding: 2px 6px; height: 22px; margin-right: 4px;">ARCHIVES</button>
          <button id="auth-btn" class="btn-auth" onclick="window.handleAuthAction()">SIGN IN</button>
        </div>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; border-top: 1px dashed var(--surface-border); padding-top: 8px; margin-top: 4px;">
        <span>THEME:</span>
        <select id="theme-select" onchange="window.changeTheme(this.value)" class="finput" style="padding: 2px 6px; font-size: 9px; font-weight: 700; height: 22px; font-family: var(--font); background: var(--bg); border: 1px solid var(--surface-border); color: var(--text);">
          <option value="terminal">TERMINAL</option>
          <option value="minimal-light">MINIMAL LIGHT</option>
          <option value="minimal-warm">MINIMAL WARM</option>
          <option value="minimal-flat-dark">MINIMAL FLAT DARK</option>
          <option value="minimal-flat-oled">MINIMAL FLAT OLED</option>
        </select>
      </div>
    </div>

    <!-- Discrete Settings Button -->
    <button id="settings-toggle-btn" onclick="window.toggleSettings()" title="Settings">⚙️</button>
  </div>

  <!-- Expandable Note Modal Overlay -->
  <div id="note-modal" class="modal-overlay">
    <div class="modal-content" style="position: relative;">
      <button class="btn-icon close-modal" onclick="window.closeNoteModal()" style="position: absolute; top: 16px; right: 16px; z-index: 100; font-size: 16px; color: var(--text-dim); background: none; border: none; cursor: pointer;">✕</button>
      <div class="modal-body-container">
        <div class="note-title-text" id="modal-note-title" contenteditable="true" style="padding-right: 32px;"></div>
        <div id="modal-note-content-wrapper"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-terminal" id="modal-btn-delete" onclick="window.deleteNoteFromModal()">DELETE</button>
        <button class="btn-terminal" id="modal-btn-archive" onclick="window.archiveNoteFromModal()">ARCHIVE</button>
        <button class="btn-terminal" id="modal-btn-type-toggle" onclick="window.toggleNoteTypeFromModal()">TO LIST</button>
        <button class="btn-terminal primary" onclick="window.closeNoteModal()">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="../../shared/js/firebase.js"></script>
  <script type="module" src="app.js?v=3.2"></script>

  <!-- PWA Service Worker Registration -->
  <script>
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (let r of registrations) {
          r.unregister().then(() => console.log('SW unregistered on localhost'));
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then(keys => {
        for (let k of keys) {
          caches.delete(k).then(() => console.log('Cache cleared on localhost:', k));
        }
      });
    }
  } else if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', {scope: './'})
      .catch(e => console.log('SW error', e));
  }
  </script>
</body>
</html>
